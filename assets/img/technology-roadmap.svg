<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1050"><defs><linearGradient id="bg" x1="0" x2="1"><stop stop-color="#020407"/><stop offset="1" stop-color="#07111d"/></linearGradient><linearGradient id="blue" x1="0" x2="1"><stop stop-color="#e6fdff"/><stop offset=".5" stop-color="#74e6ff"/><stop offset="1" stop-color="#2b72ff"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="1800" height="1050" fill="url(#bg)"/><g font-family="Inter"><text x="100" y="120" fill="#88eaff" font-size="20" letter-spacing="6">NACOREX ROADMAP</text><text x="100" y="185" fill="#fff" font-size="68" font-weight="800">From idea to industrial platform</text><text x="102" y="230" fill="#9fb1c0" font-size="22">A staged path for a serious commercial technology company.</text></g><path d="M170 560 C430 360 620 740 850 520 S1240 330 1600 545" fill="none" stroke="url(#blue)" stroke-width="8" filter="url(#glow)"/><g font-family="Inter"><g transform="translate(130 470)"><circle cx="70" cy="70" r="54" fill="url(#blue)"/><text x="53" y="82" font-size="34" font-weight="800" fill="#00131f">01</text><rect x="0" y="150" width="320" height="190" rx="18" fill="rgba(255,255,255,.045)" stroke="#7eeaff" stroke-opacity=".24"/><text x="26" y="198" fill="#fff" font-size="28" font-weight="800">Research</text><text x="26" y="238" fill="#9fb1c0" font-size="17">Define the market, customer, product architecture, and technical direction.</text></g><g transform="translate(510 600)"><circle cx="70" cy="70" r="54" fill="url(#blue)"/><text x="53" y="82" font-size="34" font-weight="800" fill="#00131f">02</text><rect x="0" y="150" width="320" height="190" rx="18" fill="rgba(255,255,255,.045)" stroke="#7eeaff" stroke-opacity=".24"/><text x="26" y="198" fill="#fff" font-size="28" font-weight="800">Prototype</text><text x="26" y="238" fill="#9fb1c0" font-size="17">Turn the concept into a product system with a strong design language.</text></g><g transform="translate(930 395)"><circle cx="70" cy="70" r="54" fill="url(#blue)"/><text x="53" y="82" font-size="34" font-weight="800" fill="#00131f">03</text><rect x="0" y="150" width="320" height="190" rx="18" fill="rgba(255,255,255,.045)" stroke="#7eeaff" stroke-opacity=".24"/><text x="26" y="198" fill="#fff" font-size="28" font-weight="800">Pilot</text><text x="26" y="238" fill="#9fb1c0" font-size="17">Work with an early commercial partner and collect real feedback.</text></g><g transform="translate(1350 510)"><circle cx="70" cy="70" r="54" fill="url(#blue)"/><text x="53" y="82" font-size="34" font-weight="800" fill="#00131f">04</text><rect x="0" y="150" width="320" height="190" rx="18" fill="rgba(255,255,255,.045)" stroke="#7eeaff" stroke-opacity=".24"/><text x="26" y="198" fill="#fff" font-size="28" font-weight="800">Scale</text><text x="26" y="238" fill="#9fb1c0" font-size="17">Build the channel, documentation, support model, and brand authority.</text></g></g></svg>