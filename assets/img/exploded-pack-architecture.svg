#7eeaff" stroke-opacity=".3"/></g><text x="1110" y="108" fill="#88eaff" font-family="Inter" font-size="18">02 / Energy module row</text></g><g transform="translate(0 340)"><path d="M220 0 1115 80 980 200 85 118Z" fill="#0b141e" stroke="#7eeaff" stroke-opacity=".34"/><path d="M280 58 930 120" stroke="url(#blue)" stroke-width="4" filter="url(#glow)"/><path d="M250 104 870 160" stroke="url(#blue)" stroke-width="2" opacity=".45"/><text x="1160" y="122" fill="#88eaff" font-family="Inter" font-size="18">03 / Management layer</text></g><g transform="translate(0 565)"><path d="M180 0 1180 95 1010 245 10 150Z" fill="#050b11" stroke="#7eeaff" stroke-opacity=".38"/><text x="1220" y="140" fill="#88eaff" font-family="Inter" font-size="18">04 / Base structure</text></g><g stroke="url(#blue)" stroke-width="2" opacity=".55"><path d="M430 95 V150"/><path d="M610 110 V205"/><path d="M790 125 V355"/><path d="M960 140 V580"/></g></g><g transform="translate(90 880)" font-family="Inter"><rect width="1420" height="130" rx="22" fill="rgba(255,255,255,.035)" stroke="#7eeaff" stroke-opacity=".2"/><text x="32" y="48" fill="#88eaff" font-size="14" letter-spacing="4">SYSTEM NOTE</text><text x="32" y="87" fill="#fff" font-size="28" font-weight="800">A serious technology brand shows the structure, the layers, and the commercial logic.</text></g></svg>